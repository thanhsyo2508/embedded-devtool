name: Bug report
description: Something isn't working as expected
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: What did you expect instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: EDT version
      placeholder: e.g. 0.1.0
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: e.g. Windows 11, Ubuntu 22.04, macOS 14
    validations:
      required: true
  - type: input
    id: device
    attributes:
      label: Device / USB-UART adapter (if relevant)
      placeholder: e.g. ESP32-S3, Nucleo-G0B1RE, CP2102
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any error messages or log output. Attach the log file if you had file logging enabled.
      render: text
