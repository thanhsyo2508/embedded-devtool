name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  lint-and-test:
    name: Lint + test (fast gate)
    runs-on: ubuntu-latest
    # A hung test otherwise stalls the job for GitHub's 6-hour default.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system deps (for cargo check/clippy against tauri)
        run: |
          sudo rm -f /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libxdo-dev libudev-dev pkg-config

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: rustfmt
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --check

      - name: clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

      # edt-cli (headless CLI) is behind an optional `cli` feature so a
      # normal GUI build never pulls in clap/ctrlc -- the clippy run above
      # skips it entirely (required-features unmet), so lint it separately
      # or it could silently bit-rot with nothing catching a broken build.
      - name: clippy (edt-cli)
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --bin edt-cli --features cli -- -D warnings

      - name: cargo test
        run: cargo test --manifest-path src-tauri/Cargo.toml --lib

      - name: eslint
        run: npm run lint

      - name: vitest
        run: npm run test

      - name: prettier
        run: npm run format:check

      - name: tsc
        run: npx tsc --noEmit

  build:
    name: Build installer (${{ matrix.platform }})
    needs: lint-and-test
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
          - platform: ubuntu-latest
          - platform: macos-latest
    runs-on: ${{ matrix.platform }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system deps
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo rm -f /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libxdo-dev libudev-dev pkg-config

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Load signing credentials
        shell: bash
        run: |
          if [ -n "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}" ]; then
            echo "TAURI_SIGNING_AVAILABLE=true" >> "$GITHUB_ENV"
          else
            echo "TAURI_SIGNING_AVAILABLE=false" >> "$GITHUB_ENV"
          fi

      # This job builds on every push as a smoke test (does it build at
      # all?), not to produce a real release artifact -- so without the
      # signing secret, disable createUpdaterArtifacts rather than fail the
      # whole job. release.yml is what actually ships signed builds.
      - name: Disable updater artifact signing for unsigned build
        if: env.TAURI_SIGNING_AVAILABLE != 'true'
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = 'src-tauri/tauri.conf.json';
          const config = JSON.parse(fs.readFileSync(path, 'utf8'));
          config.bundle.createUpdaterArtifacts = false;
          fs.writeFileSync(path, JSON.stringify(config, null, 2) + '\n');
          NODE

      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri build

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: edt-${{ matrix.platform }}
          path: |
            src-tauri/target/release/bundle/**
          if-no-files-found: error
