name: Release

# Builds signed installers for every platform and drafts a GitHub Release
# with them plus the updater's latest.json manifest — tauri-action generates
# and uploads that manifest automatically because tauri.conf.json has
# bundle.createUpdaterArtifacts set. The release is a draft: nothing is
# public until someone reviews and publishes it from the GitHub UI.
on:
  push:
    tags:
      - 'v*'

# tauri-action creates/updates the GitHub Release via the GITHUB_TOKEN
# below, which needs write access to releases — the default GITHUB_TOKEN is
# read-only unless a repo/org setting already grants write, so this must be
# declared explicitly or release creation fails with "Resource not
# accessible by integration".
permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest, ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system deps
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libxdo-dev libudev-dev pkg-config

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Load signing credentials
        shell: bash
        run: |
          if [ -n "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}" ]; then
            echo "TAURI_SIGNING_AVAILABLE=true" >> "$GITHUB_ENV"
            echo "Tauri updater signing credentials loaded from GitHub secrets."
          else
            echo "TAURI_SIGNING_AVAILABLE=false" >> "$GITHUB_ENV"
            echo "Tauri updater signing credentials not found; building unsigned bundles only."
          fi

      - name: Build and publish signed release
        if: env.TAURI_SIGNING_AVAILABLE == 'true'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'edt ${{ github.ref_name }}'
          releaseDraft: true
          prerelease: false

      - name: Disable updater artifact signing for unsigned build
        if: env.TAURI_SIGNING_AVAILABLE != 'true'
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = 'src-tauri/tauri.conf.json';
          const config = JSON.parse(fs.readFileSync(path, 'utf8'));
          config.bundle.createUpdaterArtifacts = false;
          fs.writeFileSync(path, JSON.stringify(config, null, 2) + '\n');
          NODE

      - name: Build unsigned bundles
        if: env.TAURI_SIGNING_AVAILABLE != 'true'
        run: npm run tauri build
